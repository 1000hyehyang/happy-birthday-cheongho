<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8">
    <title>Birthday Cake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="manifest" href="favicon/site.webmanifest" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="Happy Birthday 청호!">
    <meta property="og:description" content="생일 축하 케이크 페이지">
    <meta property="og:image" content="images/umeus-og.png">
    <meta property="og:locale" content="ko_KR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Happy Birthday 청호!">
    <meta name="twitter:description" content="생일 축하 케이크 페이지">
    <meta name="twitter:image" content="images/umeus-og.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <div class="cake">
      <p class="cake-message">Happy Birthday 청호!</p>
      <div class="plate"></div>
      <div class="layer layer-bottom"></div>
      <div class="layer layer-middle"></div>
      <div class="layer layer-top"></div>
      <div class="icing"></div>
      <div class="drip drip1"></div>
      <div class="drip drip2"></div>
      <div class="drip drip3"></div>
      <div
        class="candle"
        id="candle"
        role="button"
        tabindex="0"
        aria-pressed="true"
        aria-label="촛불 끄기"
      >
        <div class="flame" aria-hidden="true"></div>
      </div>
    </div>

    <audio
      id="bgm"
      src="sound/happy-birthday.mp3"
      loop
      preload="auto"
      playsinline
      aria-hidden="true"
    ></audio>

    <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>

    <div class="floating-controls">
      <button type="button" id="letterBtn" class="control-fab control-fab--letter" aria-label="편지 열기">
        <span class="control-fab__emoji" aria-hidden="true">💌</span>
      </button>
      <button type="button" id="fireworksBtn" class="control-fab control-fab--fireworks" aria-label="폭죽 터뜨리기">
        <span class="control-fab__emoji" aria-hidden="true">🎉</span>
      </button>
      <button type="button" id="bgmToggle" class="control-fab bgm-toggle" aria-pressed="false" aria-label="배경음악 재생">
        <span class="bgm-toggle__icon bgm-toggle__icon--play" aria-hidden="true">▶</span>
        <span class="bgm-toggle__icon bgm-toggle__icon--pause" aria-hidden="true">⏸</span>
      </button>
    </div>

    <div id="letterOverlay" class="letter-overlay" hidden>
      <div class="letter-backdrop" id="letterBackdrop"></div>
      <div
        class="letter-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="letterHeading"
        aria-describedby="letterTypeTarget"
      >
        <button type="button" class="letter-close" id="letterClose" aria-label="편지 닫기">
          ×
        </button>
        <h2 id="letterHeading" class="letter-heading">To. 청호</h2>
        <div class="letter-sheet" id="letterTypeTarget">
          <p class="letter-typewrap"><span id="letterText" class="letter-text"></span><span id="letterCaret" class="letter-caret" aria-hidden="true"></span></p>
        </div>
      </div>
    </div>

    <script src="./letter.js"></script>
    <script>
      (function () {
        var LETTER_BODY =
          typeof window.LETTER_BODY === "string" ? window.LETTER_BODY : "";

        var clickAudio = new Audio("sound/click.mp3");
        clickAudio.preload = "auto";
        function playClickSound() {
          clickAudio.volume = 0.4;
          try {
            clickAudio.currentTime = 0;
          } catch (e) {}
          clickAudio.play().catch(function () {});
        }

        function playFireworkSound() {
          var a = new Audio("sound/firework.mp3");
          a.volume = 0.42;
          a.play().catch(function () {});
        }

        var letterOverlay = document.getElementById("letterOverlay");
        var letterBackdrop = document.getElementById("letterBackdrop");
        var letterClose = document.getElementById("letterClose");
        var letterBtn = document.getElementById("letterBtn");
        var letterTextEl = document.getElementById("letterText");
        var letterCaretEl = document.getElementById("letterCaret");
        var letterTypeTimer = null;
        var LETTER_SEEN_KEY = "hb-letter-seen-v1";

        function letterAlreadySeen() {
          try {
            return localStorage.getItem(LETTER_SEEN_KEY) === "1";
          } catch (e) {
            return false;
          }
        }

        function markLetterSeen() {
          try {
            localStorage.setItem(LETTER_SEEN_KEY, "1");
          } catch (e) {}
        }

        function showLetterInstant() {
          if (letterTypeTimer) {
            clearTimeout(letterTypeTimer);
            letterTypeTimer = null;
          }
          if (!letterTextEl || !letterCaretEl) return;
          letterTextEl.textContent = LETTER_BODY;
          letterCaretEl.style.display = "inline";
          letterCaretEl.classList.add("letter-caret--off");
        }

        function closeLetter() {
          if (!letterOverlay) return;
          markLetterSeen();
          letterOverlay.hidden = true;
          document.body.classList.remove("letter-open");
          if (letterTypeTimer) {
            clearTimeout(letterTypeTimer);
            letterTypeTimer = null;
          }
          if (letterTextEl) letterTextEl.textContent = "";
          if (letterCaretEl) {
            letterCaretEl.style.display = "";
            letterCaretEl.classList.remove("letter-caret--off");
          }
        }

        function runLetterTypewriter() {
          if (!letterTextEl || !letterCaretEl) return;
          letterTextEl.textContent = "";
          letterCaretEl.style.display = "inline";
          letterCaretEl.classList.remove("letter-caret--off");
          var chars = Array.from(LETTER_BODY);
          var i = 0;

          function step() {
            letterTypeTimer = null;
            if (i >= chars.length) {
              letterCaretEl.classList.add("letter-caret--off");
              markLetterSeen();
              return;
            }
            var ch = chars[i];
            letterTextEl.textContent += ch;
            i++;
            var delay = ch === "\n" ? 260 : 42;
            letterTypeTimer = setTimeout(step, delay);
          }

          step();
        }

        function openLetter() {
          if (!letterOverlay) return;
          letterOverlay.hidden = false;
          document.body.classList.add("letter-open");
          if (letterAlreadySeen()) {
            showLetterInstant();
          } else {
            runLetterTypewriter();
          }
        }

        if (letterBtn) {
          letterBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            playClickSound();
            openLetter();
          });
        }

        if (letterClose) {
          letterClose.addEventListener("click", function () {
            playClickSound();
            closeLetter();
          });
        }

        if (letterBackdrop) {
          letterBackdrop.addEventListener("click", function () {
            playClickSound();
            closeLetter();
          });
        }

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && letterOverlay && !letterOverlay.hidden) {
            closeLetter();
          }
        });

        var canvas = document.getElementById("fireworksCanvas");
        var fireworksBtn = document.getElementById("fireworksBtn");

        if (canvas && canvas.getContext) {
          var ctx = canvas.getContext("2d");
          var particles = [];
          var rafId = null;

          function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          }

          window.addEventListener("resize", resizeCanvas);
          resizeCanvas();

          function pickColor() {
            var palette = ["#ff6b9d", "#ffd93d", "#6bcb77", "#4d96ff", "#ff9ff3", "#ffffff", "#ff8f8f", "#c9b1ff"];
            return palette[Math.floor(Math.random() * palette.length)];
          }

          function burst(cx, cy) {
            var count = 96 + Math.floor(Math.random() * 64);
            for (var i = 0; i < count; i++) {
              var a = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
              var sp = 2.5 + Math.random() * 5.5;
              particles.push({
                x: cx,
                y: cy,
                vx: Math.cos(a) * sp,
                vy: Math.sin(a) * sp,
                life: 1,
                decay: 0.004 + Math.random() * 0.01,
                color: pickColor(),
                size: 1.5 + Math.random() * 2.5
              });
            }
          }

          function tick() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = particles.length - 1; i >= 0; i--) {
              var p = particles[i];
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.072;
              p.vx *= 0.991;
              p.life -= p.decay;
              if (p.life <= 0) {
                particles.splice(i, 1);
                continue;
              }
              ctx.globalAlpha = Math.min(1, p.life);
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            if (particles.length > 0) {
              rafId = requestAnimationFrame(tick);
            } else {
              rafId = null;
            }
          }

          function launchFireworks() {
            playFireworkSound();
            resizeCanvas();
            var w = canvas.width;
            var h = canvas.height;
            var bursts = 10;
            for (var b = 0; b < bursts; b++) {
              (function (delay) {
                setTimeout(function () {
                  var x = w * (0.12 + Math.random() * 0.76);
                  var y = h * (0.08 + Math.random() * 0.38);
                  burst(x, y);
                  if (!rafId) rafId = requestAnimationFrame(tick);
                }, delay);
              })(b * 260);
            }
          }

          if (fireworksBtn) {
            fireworksBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              playClickSound();
              launchFireworks();
            });
          }
        }

        var bgm = document.getElementById("bgm");
        var bgmToggle = document.getElementById("bgmToggle");

        function updateBgmButton() {
          if (!bgmToggle || !bgm) return;
          var playing = !bgm.paused;
          bgmToggle.setAttribute("aria-pressed", playing ? "true" : "false");
          bgmToggle.setAttribute("aria-label", playing ? "배경음악 일시정지" : "배경음악 재생");
          bgmToggle.classList.toggle("bgm-toggle--playing", playing);
        }

        if (bgm) {
          bgm.volume = 0.45;
          bgm.addEventListener("play", updateBgmButton);
          bgm.addEventListener("pause", updateBgmButton);

          function playBgm() {
            return bgm.play().catch(function () {});
          }

          function resumeOnInteract() {
            if (bgm.paused) playBgm();
            document.body.removeEventListener("click", resumeOnInteract);
            document.body.removeEventListener("touchend", resumeOnInteract);
          }

          playBgm().catch(function () {
            document.body.addEventListener("click", resumeOnInteract);
            document.body.addEventListener("touchend", resumeOnInteract);
          });

          if (bgmToggle) {
            bgmToggle.addEventListener("click", function (e) {
              e.stopPropagation();
              playClickSound();
              if (bgm.paused) {
                playBgm();
              } else {
                bgm.pause();
              }
            });
          }

          updateBgmButton();
        }

        var candle = document.getElementById("candle");
        if (candle) {
          function setState(out) {
            candle.classList.toggle("is-out", out);
            candle.setAttribute("aria-pressed", out ? "false" : "true");
            candle.setAttribute("aria-label", out ? "촛불 다시 켜기" : "촛불 끄기");
          }

          function toggle() {
            playClickSound();
            setState(!candle.classList.contains("is-out"));
          }

          candle.addEventListener("click", toggle);
          candle.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggle();
            }
          });
        }
      })();
    </script>
  </body>

</html>
