<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8">
    <title>Birthday Cake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="manifest" href="favicon/site.webmanifest" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="Happy Birthday 청호!">
    <meta property="og:description" content="청호의 25번째 생일을 축하합니다🎉">
    <meta property="og:image" content="images/umeus-og.png">
    <meta property="og:locale" content="ko_KR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Happy Birthday 청호!">
    <meta name="twitter:description" content="청호의 25번째 생일을 축하합니다🎉">
    <meta name="twitter:image" content="images/umeus-og.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <div class="cake">
      <p class="cake-message">Happy Birthday 청호!</p>
      <div class="plate"></div>
      <div class="layer layer-bottom"></div>
      <div class="layer layer-middle"></div>
      <div class="layer layer-top"></div>
      <div class="icing"></div>
      <div class="drip drip1"></div>
      <div class="drip drip2"></div>
      <div class="drip drip3"></div>
      <div
        class="candle"
        id="candle"
        role="button"
        tabindex="0"
        aria-pressed="true"
        aria-label="촛불 끄기"
      >
        <div class="flame" aria-hidden="true"></div>
      </div>
      <div class="cake-seduce" id="seduceCakeWrap" hidden>
        <img class="cake-seduce__img" src="images/유혹중.gif" alt="" draggable="false" aria-hidden="true" />
      </div>
    </div>

    <audio
      id="bgm"
      src="sound/happy-birthday.mp3"
      loop
      preload="auto"
      playsinline
      aria-hidden="true"
    ></audio>

    <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>

    <div id="wallNotes" class="wall-notes" aria-hidden="true"></div>

    <div id="noteReadOverlay" class="note-read-overlay" hidden>
      <div class="note-read-backdrop" id="noteReadBackdrop"></div>
      <div
        class="note-read-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="noteReadText"
      >
        <p id="noteReadText" class="note-read-body"></p>
      </div>
    </div>
    <div id="noteLimitFlash" class="note-limit-flash" hidden aria-hidden="true"></div>

    <div class="floating-controls">
      <button type="button" id="letterBtn" class="control-fab control-fab--letter" aria-label="편지 열기">
        <span class="control-fab__emoji" aria-hidden="true">💌</span>
      </button>
      <button type="button" id="noteBtn" class="control-fab control-fab--note" aria-pressed="false" aria-label="쪽지 붙이기">
        <span class="control-fab__emoji" aria-hidden="true">✏️</span>
      </button>
      <button type="button" id="seduceBtn" class="control-fab control-fab--seduce" aria-pressed="false" aria-label="유혹">
        <span class="control-fab__emoji" aria-hidden="true">🌹</span>
      </button>
      <button type="button" id="fireworksBtn" class="control-fab control-fab--fireworks" aria-label="폭죽 터뜨리기">
        <span class="control-fab__emoji" aria-hidden="true">🎉</span>
      </button>
      <button type="button" id="bgmToggle" class="control-fab bgm-toggle" aria-pressed="false" aria-label="배경음악 재생">
        <span class="bgm-toggle__icon bgm-toggle__icon--play" aria-hidden="true">▶</span>
        <span class="bgm-toggle__icon bgm-toggle__icon--pause" aria-hidden="true">⏸</span>
      </button>
    </div>

    <div id="letterOverlay" class="letter-overlay" hidden>
      <div class="letter-backdrop" id="letterBackdrop"></div>
      <div
        class="letter-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="letterHeading"
        aria-describedby="letterTypeTarget"
      >
        <button type="button" class="letter-close" id="letterClose" aria-label="편지 닫기">
          ×
        </button>
        <h2 id="letterHeading" class="letter-heading">To. 청호</h2>
        <div class="letter-sheet" id="letterTypeTarget">
          <p class="letter-typewrap"><span id="letterText" class="letter-text"></span><span id="letterCaret" class="letter-caret" aria-hidden="true"></span></p>
        </div>
      </div>
    </div>

    <script src="./letter.js"></script>
    <script>
      (function () {
        var LETTER_BODY =
          typeof window.LETTER_BODY === "string" ? window.LETTER_BODY : "";

        var clickAudio = new Audio("sound/click.mp3");
        clickAudio.preload = "auto";
        function playClickSound() {
          clickAudio.volume = 0.4;
          try {
            clickAudio.currentTime = 0;
          } catch (e) {}
          clickAudio.play().catch(function () {});
        }

        function playFireworkSound() {
          var a = new Audio("sound/firework.mp3");
          a.volume = 0.42;
          a.play().catch(function () {});
        }

        var letterOverlay = document.getElementById("letterOverlay");
        var letterBackdrop = document.getElementById("letterBackdrop");
        var letterClose = document.getElementById("letterClose");
        var letterBtn = document.getElementById("letterBtn");
        var letterTextEl = document.getElementById("letterText");
        var letterCaretEl = document.getElementById("letterCaret");
        var letterTypeTimer = null;
        var LETTER_SEEN_KEY = "hb-letter-seen-v1";

        function letterAlreadySeen() {
          try {
            return localStorage.getItem(LETTER_SEEN_KEY) === "1";
          } catch (e) {
            return false;
          }
        }

        function markLetterSeen() {
          try {
            localStorage.setItem(LETTER_SEEN_KEY, "1");
          } catch (e) {}
        }

        function showLetterInstant() {
          if (letterTypeTimer) {
            clearTimeout(letterTypeTimer);
            letterTypeTimer = null;
          }
          if (!letterTextEl || !letterCaretEl) return;
          letterTextEl.textContent = LETTER_BODY;
          letterCaretEl.style.display = "inline";
          letterCaretEl.classList.add("letter-caret--off");
        }

        function closeLetter() {
          if (!letterOverlay) return;
          markLetterSeen();
          letterOverlay.hidden = true;
          document.body.classList.remove("letter-open");
          if (letterTypeTimer) {
            clearTimeout(letterTypeTimer);
            letterTypeTimer = null;
          }
          if (letterTextEl) letterTextEl.textContent = "";
          if (letterCaretEl) {
            letterCaretEl.style.display = "";
            letterCaretEl.classList.remove("letter-caret--off");
          }
        }

        function runLetterTypewriter() {
          if (!letterTextEl || !letterCaretEl) return;
          letterTextEl.textContent = "";
          letterCaretEl.style.display = "inline";
          letterCaretEl.classList.remove("letter-caret--off");
          var chars = Array.from(LETTER_BODY);
          var i = 0;

          function step() {
            letterTypeTimer = null;
            if (i >= chars.length) {
              letterCaretEl.classList.add("letter-caret--off");
              markLetterSeen();
              return;
            }
            var ch = chars[i];
            letterTextEl.textContent += ch;
            i++;
            var delay = ch === "\n" ? 260 : 42;
            letterTypeTimer = setTimeout(step, delay);
          }

          step();
        }

        function openLetter() {
          if (!letterOverlay) return;
          letterOverlay.hidden = false;
          document.body.classList.add("letter-open");
          if (letterAlreadySeen()) {
            showLetterInstant();
          } else {
            runLetterTypewriter();
          }
        }

        if (letterBtn) {
          letterBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            playClickSound();
            openLetter();
          });
        }

        if (letterClose) {
          letterClose.addEventListener("click", function () {
            playClickSound();
            closeLetter();
          });
        }

        if (letterBackdrop) {
          letterBackdrop.addEventListener("click", function () {
            playClickSound();
            closeLetter();
          });
        }

        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;
          var noteReadOv = document.getElementById("noteReadOverlay");
          if (noteReadOv && !noteReadOv.hidden) {
            noteReadOv.hidden = true;
            document.body.classList.remove("note-read-open");
            return;
          }
          if (letterOverlay && !letterOverlay.hidden) {
            closeLetter();
          } else if (document.body.classList.contains("note-mode")) {
            setNoteMode(false);
          }
        });

        var seduceBtn = document.getElementById("seduceBtn");
        var seduceCakeWrap = document.getElementById("seduceCakeWrap");

        function updateSeduceButton() {
          if (!seduceBtn || !seduceCakeWrap) return;
          var on = !seduceCakeWrap.hidden;
          seduceBtn.setAttribute("aria-pressed", on ? "true" : "false");
        }

        if (seduceBtn && seduceCakeWrap) {
          seduceBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            playClickSound();
            seduceCakeWrap.toggleAttribute("hidden");
            updateSeduceButton();
          });
          updateSeduceButton();
        }

        var NOTE_IMAGES = [
          "images/쪽지-1.png",
          "images/쪽지-2.png",
          "images/쪽지-3.png",
          "images/쪽지-4.png"
        ];
        var NOTE_PHRASES = [
          "청탱이 사랑해!",
          "우리 일본 여행도 가야하는데~",
          "2026년은 롯데가 우승~~!! 하려나? ㅋ",
          "2026년도 LG가 우승할게~~",
          "선물은 마음에 들어 청호야?",
          "사슴같은 눈망울을 가진 우리 청호",
          "청호 내 생일 때는 뭐 해줄지 긴장하고 있나~",
          "이런 여자친구는 나밖에 없을거야!!",
          "내년 생일도 함께 해야해~~",
          "해피 벌쓰데이 청호!",
          "잘 져줘서 항상 고마워~~ 지는 게 이기는거래! ㅎㅎ",
          "그만 널부렁하고 나랑 같이 공부하자~~",
          "항상 웃기! 행복하기! 건강하기!",
          "이벤트는 마음에 들었을라나~~",
          "쪽지의 모든 내용을 알려면 시간이 꽤 걸릴걸~",
          "청호가 깃허브라는 걸 알면 쪽지 내용을 다 알 수 있겠지만~",
          "나는 서버 개발자라 이런 거 잘 못 만드는데 AI 최고당!",
          "청호 올해는 나랑 칼바람만 해~~ 롤 끊기!!"
        ];
        var MAX_NOTES = 8;
        var NOTES_STORAGE_KEY = "hb-wall-notes-v2";
        var NOTES_STORAGE_KEY_LEGACY = "hb-wall-notes-v1";
        var wallNotesEl = document.getElementById("wallNotes");
        var noteBtn = document.getElementById("noteBtn");
        var noteReadOverlay = document.getElementById("noteReadOverlay");
        var noteReadBackdrop = document.getElementById("noteReadBackdrop");
        var noteReadTextEl = document.getElementById("noteReadText");
        var noteLimitFlash = document.getElementById("noteLimitFlash");
        var nextNoteIndex = 0;
        var noteLimitFlashTimer = null;

        /** 이미 쓰인 문구(used)를 제외하고 무작위 선택 — 풀이 비면 전체에서 무작위 */
        function pickRandomUnusedPhrase(used) {
          var pool = [];
          for (var i = 0; i < NOTE_PHRASES.length; i++) {
            if (!used.has(NOTE_PHRASES[i])) pool.push(NOTE_PHRASES[i]);
          }
          if (pool.length === 0) {
            return NOTE_PHRASES[Math.floor(Math.random() * NOTE_PHRASES.length)];
          }
          return pool[Math.floor(Math.random() * pool.length)];
        }

        function getUsedTextsFromWall() {
          var used = new Set();
          if (!wallNotesEl) return used;
          var nodes = wallNotesEl.querySelectorAll(".wall-note");
          for (var i = 0; i < nodes.length; i++) {
            var t = nodes[i].dataset.text;
            if (t) used.add(t);
          }
          return used;
        }

        /** 저장된 목록 안에서 문구 중복·빈 값을 서로 겹치지 않게 고침 */
        function dedupeNoteTexts(items) {
          var used = new Set();
          var changed = false;
          for (var i = 0; i < items.length; i++) {
            var it = items[i];
            if (!it) continue;
            var t = typeof it.text === "string" ? it.text.trim() : "";
            if (!t || used.has(t)) {
              it.text = pickRandomUnusedPhrase(used);
              changed = true;
            }
            used.add(it.text);
          }
          return changed;
        }

        function loadNotesFromStorage() {
          try {
            var raw = localStorage.getItem(NOTES_STORAGE_KEY);
            if (raw) {
              var parsed = JSON.parse(raw);
              if (Array.isArray(parsed)) {
                if (parsed.length > MAX_NOTES) {
                  parsed = parsed.slice(0, MAX_NOTES);
                  localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(parsed));
                }
                if (dedupeNoteTexts(parsed)) {
                  localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(parsed));
                }
                return parsed;
              }
            }
            var oldRaw = localStorage.getItem(NOTES_STORAGE_KEY_LEGACY);
            if (oldRaw) {
              var old = JSON.parse(oldRaw);
              if (Array.isArray(old)) {
                for (var j = 0; j < old.length; j++) {
                  if (old[j] && typeof old[j].text !== "string") {
                    old[j].text = "";
                  }
                }
                if (old.length > MAX_NOTES) {
                  old = old.slice(0, MAX_NOTES);
                }
                dedupeNoteTexts(old);
                localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(old));
                localStorage.removeItem(NOTES_STORAGE_KEY_LEGACY);
                return old;
              }
            }
          } catch (e) {}
          return [];
        }

        function saveNotesToStorage(items) {
          try {
            localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(items));
          } catch (e) {}
        }

        function getWallNoteData() {
          if (!wallNotesEl) return [];
          var nodes = wallNotesEl.querySelectorAll(".wall-note");
          var out = [];
          for (var i = 0; i < nodes.length; i++) {
            var el = nodes[i];
            var img = el.querySelector("img");
            if (!img) continue;
            out.push({
              src: img.getAttribute("src") || "",
              x: parseFloat(el.dataset.x) || 0,
              y: parseFloat(el.dataset.y) || 0,
              rot: parseFloat(el.dataset.rot) || 0,
              text: el.dataset.text || ""
            });
          }
          return out;
        }

        function renderWallNote(item) {
          if (!wallNotesEl) return;
          var text =
            typeof item.text === "string" && item.text
              ? item.text
              : pickRandomUnusedPhrase(getUsedTextsFromWall());
          var wrap = document.createElement("div");
          wrap.className = "wall-note";
          wrap.dataset.x = String(item.x);
          wrap.dataset.y = String(item.y);
          wrap.dataset.rot = String(item.rot);
          wrap.dataset.text = text;
          wrap.setAttribute("role", "button");
          wrap.setAttribute("tabindex", "0");
          wrap.setAttribute("aria-label", "쪽지: " + text);
          wrap.style.left = item.x * 100 + "%";
          wrap.style.top = item.y * 100 + "%";
          wrap.style.transform =
            "translate(-50%, -50%) rotate(" + item.rot + "deg)";
          var img = document.createElement("img");
          img.src = item.src;
          img.alt = "";
          img.draggable = false;
          wrap.appendChild(img);
          wallNotesEl.appendChild(wrap);
        }

        function restoreWallNotes() {
          if (!wallNotesEl) return;
          wallNotesEl.innerHTML = "";
          var items = loadNotesFromStorage();
          for (var i = 0; i < items.length; i++) {
            var it = items[i];
            if (!it || typeof it.src !== "string" || typeof it.x !== "number" || typeof it.y !== "number") continue;
            if (typeof it.rot !== "number") it.rot = 0;
            renderWallNote(it);
          }
        }

        function updateNoteModeButton() {
          if (!noteBtn) return;
          var on = document.body.classList.contains("note-mode");
          noteBtn.setAttribute("aria-pressed", on ? "true" : "false");
          noteBtn.setAttribute("aria-label", on ? "쪽지 붙이기 끄기" : "쪽지 붙이기");
        }

        function setNoteMode(on) {
          document.body.classList.toggle("note-mode", on);
          updateNoteModeButton();
        }

        function showNoteRead(text) {
          if (!noteReadOverlay || !noteReadTextEl) return;
          noteReadTextEl.textContent = text || "";
          noteReadOverlay.hidden = false;
          document.body.classList.add("note-read-open");
        }

        function hideNoteRead() {
          if (!noteReadOverlay) return;
          noteReadOverlay.hidden = true;
          document.body.classList.remove("note-read-open");
        }

        function flashNoteLimit() {
          if (!noteLimitFlash) return;
          if (noteLimitFlashTimer) {
            clearTimeout(noteLimitFlashTimer);
            noteLimitFlashTimer = null;
          }
          noteLimitFlash.hidden = false;
          noteLimitFlash.setAttribute("aria-hidden", "false");
          noteLimitFlash.classList.remove("note-limit-flash--animate");
          void noteLimitFlash.offsetWidth;
          noteLimitFlash.classList.add("note-limit-flash--animate");
          noteLimitFlashTimer = setTimeout(function () {
            noteLimitFlash.hidden = true;
            noteLimitFlash.setAttribute("aria-hidden", "true");
            noteLimitFlash.classList.remove("note-limit-flash--animate");
            noteLimitFlashTimer = null;
          }, 980);
        }

        if (wallNotesEl && noteBtn) {
          restoreWallNotes();
          nextNoteIndex = wallNotesEl.querySelectorAll(".wall-note").length;

          noteBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            playClickSound();
            setNoteMode(!document.body.classList.contains("note-mode"));
          });

          if (noteReadBackdrop) {
            noteReadBackdrop.addEventListener("click", function () {
              playClickSound();
              hideNoteRead();
            });
          }

          wallNotesEl.addEventListener("click", function (e) {
            if (letterOverlay && !letterOverlay.hidden) return;
            var note = e.target.closest && e.target.closest(".wall-note");
            var noteModeOn = document.body.classList.contains("note-mode");

            if (note) {
              e.stopPropagation();
              if (noteModeOn) {
                playClickSound();
                note.remove();
                saveNotesToStorage(getWallNoteData());
              } else {
                playClickSound();
                showNoteRead(note.dataset.text || "");
              }
              return;
            }

            if (!noteModeOn) return;

            var count = wallNotesEl.querySelectorAll(".wall-note").length;
            if (count >= MAX_NOTES) {
              playClickSound();
              flashNoteLimit();
              return;
            }

            var w = window.innerWidth;
            var h = window.innerHeight;
            if (w < 1 || h < 1) return;
            var x = e.clientX / w;
            var y = e.clientY / h;
            var rot = -6 + Math.random() * 12;
            var src = NOTE_IMAGES[nextNoteIndex % NOTE_IMAGES.length];
            nextNoteIndex++;
            var item = {
              src: src,
              x: x,
              y: y,
              rot: rot,
              text: pickRandomUnusedPhrase(getUsedTextsFromWall())
            };
            renderWallNote(item);
            saveNotesToStorage(getWallNoteData());
            playClickSound();
          });

          wallNotesEl.addEventListener("keydown", function (e) {
            var note = e.target.closest && e.target.closest(".wall-note");
            if (!note || (e.key !== "Enter" && e.key !== " ")) return;
            e.preventDefault();
            if (document.body.classList.contains("note-mode")) return;
            if (letterOverlay && !letterOverlay.hidden) return;
            playClickSound();
            showNoteRead(note.dataset.text || "");
          });
        }

        var canvas = document.getElementById("fireworksCanvas");
        var fireworksBtn = document.getElementById("fireworksBtn");

        if (canvas && canvas.getContext) {
          var ctx = canvas.getContext("2d");
          var particles = [];
          var rafId = null;

          function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          }

          window.addEventListener("resize", resizeCanvas);
          resizeCanvas();

          function pickColor() {
            var palette = ["#ff6b9d", "#ffd93d", "#6bcb77", "#4d96ff", "#ff9ff3", "#ffffff", "#ff8f8f", "#c9b1ff"];
            return palette[Math.floor(Math.random() * palette.length)];
          }

          function burst(cx, cy) {
            var count = 96 + Math.floor(Math.random() * 64);
            for (var i = 0; i < count; i++) {
              var a = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
              var sp = 2.5 + Math.random() * 5.5;
              particles.push({
                x: cx,
                y: cy,
                vx: Math.cos(a) * sp,
                vy: Math.sin(a) * sp,
                life: 1,
                decay: 0.004 + Math.random() * 0.01,
                color: pickColor(),
                size: 1.5 + Math.random() * 2.5
              });
            }
          }

          function tick() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = particles.length - 1; i >= 0; i--) {
              var p = particles[i];
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.072;
              p.vx *= 0.991;
              p.life -= p.decay;
              if (p.life <= 0) {
                particles.splice(i, 1);
                continue;
              }
              ctx.globalAlpha = Math.min(1, p.life);
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            if (particles.length > 0) {
              rafId = requestAnimationFrame(tick);
            } else {
              rafId = null;
            }
          }

          function launchFireworks() {
            playFireworkSound();
            resizeCanvas();
            var w = canvas.width;
            var h = canvas.height;
            var bursts = 10;
            for (var b = 0; b < bursts; b++) {
              (function (delay) {
                setTimeout(function () {
                  var x = w * (0.12 + Math.random() * 0.76);
                  var y = h * (0.08 + Math.random() * 0.38);
                  burst(x, y);
                  if (!rafId) rafId = requestAnimationFrame(tick);
                }, delay);
              })(b * 260);
            }
          }

          if (fireworksBtn) {
            fireworksBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              playClickSound();
              launchFireworks();
            });
          }
        }

        var bgm = document.getElementById("bgm");
        var bgmToggle = document.getElementById("bgmToggle");

        function updateBgmButton() {
          if (!bgmToggle || !bgm) return;
          var playing = !bgm.paused;
          bgmToggle.setAttribute("aria-pressed", playing ? "true" : "false");
          bgmToggle.setAttribute("aria-label", playing ? "배경음악 일시정지" : "배경음악 재생");
          bgmToggle.classList.toggle("bgm-toggle--playing", playing);
        }

        if (bgm) {
          bgm.volume = 0.45;
          bgm.addEventListener("play", updateBgmButton);
          bgm.addEventListener("pause", updateBgmButton);

          function playBgm() {
            return bgm.play().catch(function () {});
          }

          function resumeOnInteract() {
            if (bgm.paused) playBgm();
            document.body.removeEventListener("click", resumeOnInteract);
            document.body.removeEventListener("touchend", resumeOnInteract);
          }

          playBgm().catch(function () {
            document.body.addEventListener("click", resumeOnInteract);
            document.body.addEventListener("touchend", resumeOnInteract);
          });

          if (bgmToggle) {
            bgmToggle.addEventListener("click", function (e) {
              e.stopPropagation();
              playClickSound();
              if (bgm.paused) {
                playBgm();
              } else {
                bgm.pause();
              }
            });
          }

          updateBgmButton();
        }

        var candle = document.getElementById("candle");
        if (candle) {
          function setState(out) {
            candle.classList.toggle("is-out", out);
            candle.setAttribute("aria-pressed", out ? "false" : "true");
            candle.setAttribute("aria-label", out ? "촛불 다시 켜기" : "촛불 끄기");
          }

          function toggle() {
            playClickSound();
            setState(!candle.classList.contains("is-out"));
          }

          candle.addEventListener("click", toggle);
          candle.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggle();
            }
          });
        }
      })();
    </script>
  </body>

</html>
